name: Build Check

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: 필수 정적 파일 확인
        shell: bash
        run: |
          test -f index.html
          test -f style.css
          test -f main.js
          test -f tracking.js
          test -f sitemap.xml
          test -f robots.txt

      - name: JavaScript 문법 검사
        shell: bash
        run: find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check

      - name: 한국어 URL 일관성 검사
        shell: bash
        run: node scripts/check-localized-routes.mjs
