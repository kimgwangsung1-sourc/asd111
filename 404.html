<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>NEONCPS | Page Not Found</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --muted: #a3a3a3;
      --accent: #00f5c4;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Manrope, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 245, 196, 0.12), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(0, 136, 255, 0.10), transparent 30%),
        var(--bg);
    }

    .card {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 40px);
      letter-spacing: 1px;
    }

    p {
      margin: 10px 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--accent);
      background: rgba(0, 245, 196, 0.12);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Page Not Found</h1>
    <p>The page you tried to open does not exist.</p>
    <p>You can return to the CPS click speed test, open the privacy page, or go back to the Korean version.</p>
    <div class="actions">
      <a class="btn" href="/">Open CPS Test</a>
      <a class="btn" href="/ko/">Open Korean Page</a>
      <a class="btn" href="/privacy/">Privacy Policy</a>
    </div>
  </main>
</body>
</html>
